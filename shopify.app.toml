# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "fe498ceb049ee2edc48f609a10869a64"
name = "Fomoify Popup Test"
application_url = "https://fomoify-test.vercel.app"
embedded = true
handle = "fomoify-popup-test"

[build]
automatically_update_urls_on_dev = false

[webhooks]
api_version = "2026-01"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "/webhooks"

  [[webhooks.subscriptions]]
  topics = ["app/scopes_update"]
  uri = "/webhooks"

  [[webhooks.subscriptions]]
  topics = ["orders/create"]
  uri = "/webhooks"

  [[webhooks.subscriptions]]
  compliance_topics = ["customers/data_request", "customers/redact", "shop/redact"]
  uri = "/webhooks"

[access_scopes]
scopes = "read_products,write_products,read_themes,write_themes,write_orders,read_orders,read_customers,write_customers"

[auth]
redirect_urls = [
  "https://fomoify-test.vercel.app/auth/callback",
  "https://fomoify-test.vercel.app/shopify/callback",
  "https://fomoify-test.vercel.app/api/auth/callback"
]

[app_proxy]
url = "https://fomoify-test.vercel.app/proxy/fomo"
subpath = "fomo"
prefix = "apps"

[pos]
embedded = true
